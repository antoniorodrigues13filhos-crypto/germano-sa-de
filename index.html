```html
<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germano Saúde Animal | Excelência Nutricional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @theme {
            --color-petroleum: #0F3A47;
            --color-emerald: #047857;
            --color-emerald-light: #10B981;
            --color-milky: #F5F7F5;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-milky);
            color: var(--color-petroleum);
            overflow: hidden; 
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s ease;
        }

        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="antialiased selection:bg-emerald selection:text-white">

<nav class="fixed top-0 w-full z-50 glass-nav">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <img src="logo_germano-removebg-preview.png" class="w-36">
        <div class="hidden md:flex gap-10 items-center text-sm font-semibold">
            <a href="#scroll-hero">Inovação</a>
            <a href="#produtos">Produtos</a>
        </div>
    </div>
</nav>

<section id="scroll-hero" style="height:200vh;background:#000;"></section>

<!-- PRODUTOS -->
<section id="produtos" class="py-32 bg-milky">
    <div class="max-w-7xl mx-auto px-6">
        <h2 class="text-4xl font-black mb-12">BioTech Germano</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>
</section>

<script>
const produtos = [
    {
        nome: "Germano Prime",
        descricao: "Alta performance e precisão molecular.",
        imagem: "produto1.png"
    },
    {
        nome: "Germano Plus",
        descricao: "Fortalecimento imunológico.",
        imagem: "produto2.png"
    },
    {
        nome: "Germano Max",
        descricao: "Máxima proteção do rebanho.",
        imagem: "produto3.png"
    }
];

const container = document.querySelector("#produtos .grid");

produtos.forEach(produto => {
    const card = document.createElement("div");

    card.className = `
    reveal group p-10 rounded-[40px] bg-white/50 backdrop-blur-md border border-white
    transition-all duration-500 hover:-translate-y-4 hover:shadow-2xl cursor-pointer`;

    card.innerHTML = `
        <div class="mb-6 overflow-hidden rounded-2xl">
            <img src="${produto.imagem}" 
            class="w-full h-48 object-cover transition-transform duration-700 group-hover:scale-110">
        </div>

        <h3 class="text-2xl font-bold mb-4 group-hover:text-emerald">
            ${produto.nome}
        </h3>

        <p class="text-sm opacity-70">
            ${produto.descricao}
        </p>
    `;

    container.appendChild(card);
});

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

setTimeout(() => {
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
}, 200);
</script>

</body>
</html>
```
