<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germano Saúde Animal | Excelência Nutricional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @theme {
            --color-petroleum: #0F3A47;
            --color-emerald: #047857;
            --color-emerald-light: #10B981;
            --color-milky: #F5F7F5;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-milky);
            color: var(--color-petroleum);
            overflow: hidden; 
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ===== ADICIONADO ===== */
        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s ease;
        }

        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased selection:bg-emerald selection:text-white">

    <div id="loader" style="position:fixed;inset:0;background:linear-gradient(135deg,#0F3A47,#047857);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <div class="mb-6 animate-pulse">
            <img src="logo_germano-removebg-preview.png" alt="Germano" class="w-40 h-40 object-contain">
        </div>
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.2);border-radius:99px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:white;width:0%;transition:width 0.2s;"></div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 transition-all duration-300 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-0 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo_germano-removebg-preview.png" alt="Logo" class="w-36 h-36 object-contain scale-160 -translate-x-2 transform-gpu origin-left">
            </div>
            <div class="hidden md:flex gap-10 items-center text-sm font-semibold tracking-wide text-petroleum">
                <a href="#scroll-hero" class="hover:text-emerald transition-colors">Inovação</a>
                <a href="#produtos" class="hover:text-emerald transition-colors">Produtos</a>
                <button class="bg-petroleum text-white px-8 py-3 rounded-full hover:bg-petroleum-dark transition-all cursor-pointer">Falar com Especialista</button>
            </div>
        </div>
    </nav>

    <section id="scroll-hero" style="height:400vh;position:relative;background-color:#000;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas"></canvas>
        </div>
    </section>

    <section id="produtos" class="py-32 bg-milky relative z-10">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black text-petroleum mb-12 uppercase tracking-tighter">BioTech Germano</h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="produtos-container"></div>

        </div>
    </section>

    <script>
        function initLucide(){ if(window.lucide){ lucide.createIcons(); }else{ setTimeout(initLucide,100); } }
        initLucide();

        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("hero-canvas");
            const context = canvas.getContext("2d");
            const heroEl = document.getElementById("scroll-hero");
            
            const frameCount = 78;
            const images = [];
            let loadedImages = 0;

            const getUrl = (index) => `./frame_${index.toString().padStart(2, '0')}_delay-0.041s.webp`;

            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };

            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    if (loadedImages === frameCount) {
                        document.getElementById("loader").style.display = "none";
                        document.body.style.overflow = "auto";
                        resizeCanvas();
                    }
                };
                img.src = getUrl(i);
            }
        });

        /* ===== NOVO SISTEMA DE PRODUTOS ATUALIZADO ===== */

        const produtos = [
            {
                nome: "Calmix Cromovita",
                descricao: "Solução avançada para o equilíbrio nutricional e redução de estresse do rebanho.",
                imagem: "produtos/produto%20calmix%20cromovita1.png"
            },
            {
                nome: "Fort Vit + 3",
                descricao: "Complexo vitamínico de alta concentração para máximo desempenho e imunidade.",
                imagem: "produtos/produto%20fort%20vit%20+%203.png"
            },
            {
                nome: "Germano Núcleo Acelerado",
                descricao: "Tecnologia molecular para aceleração de ganho de peso e eficiência alimentar.",
                imagem: "produtos/produto%20germano%20nucleo%20acelerado%202.png"
            }
        ];

        const containerProdutos = document.getElementById("produtos-container");

        produtos.forEach(produto => {
            const card = document.createElement("div");

            card.className = `
                reveal group p-10 rounded-[40px] bg-white/50 backdrop-blur-md border border-white
                transition-all duration-500 hover:-translate-y-4 hover:shadow-2xl hover:shadow-emerald/20 cursor-pointer
            `;

            card.innerHTML = `
                <div class="mb-6 overflow-hidden rounded-2xl">
                    <img src="${produto.imagem}" 
                        class="w-full h-48 object-cover transition-transform duration-700 group-hover:scale-110">
                </div>

                <h3 class="text-2xl font-bold mb-4 group-hover:text-emerald">
                    ${produto.nome}
                </h3>

                <p class="text-petroleum/60 text-sm">
                    ${produto.descricao}
                </p>
            `;

            containerProdutos.appendChild(card);
        });

        /* ===== ANIMAÇÃO REVEAL ===== */

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting){
                    entry.target.classList.add("show");
                }
            });
        });

        setTimeout(() => {
            document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
        }, 300);

    </script>

</body>
</html>

</body>
</html>
