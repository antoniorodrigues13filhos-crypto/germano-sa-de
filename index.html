<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrição de Precisão | Agronegócio de Alta Performance</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style type="text/tailwindcss">
        @theme {
            --color-teal-900: #0D3A3F;
            --color-teal-800: #12555C;
            --color-teal-600: #1B838C;
            --color-emerald-500: #10B981;
            --color-emerald-600: #059669;
            --color-milk-50: #F5F7F5;
            --color-milk-100: #EAEFEA;
            
            --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-milk-50);
            color: var(--color-teal-900);
            overflow: hidden; 
        }

        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(13, 58, 63, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(13, 58, 63, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .glass-card-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px -10px rgba(13, 58, 63, 0.1);
        }

        .glass-card-dark {
            background: rgba(13, 58, 63, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased selection:bg-emerald-500 selection:text-white">

    <div id="loader" style="position:fixed;inset:0;background:linear-gradient(135deg,#0D3A3F,#059669);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <div class="mb-4 animate-pulse">
            <i data-lucide="flask-conical" class="w-16 h-16 text-white"></i>
        </div>
        <h2 class="text-3xl font-bold text-white mb-2 tracking-tight uppercase">Biotecnologia Avançada</h2>
        <div style="width:16rem;height:0.5rem;background:rgba(255,255,255,0.3);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:white;transition:all 100ms ease-out;width:0%;"></div>
        </div>
        <p id="loading-text" class="text-white/80 mt-2 text-sm font-medium">Sintetizando nutrientes 0%...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 transition-all duration-300">
        <div class="absolute inset-0 bg-white/60 backdrop-blur-xl border-b border-white/20 shadow-sm shadow-teal-900/5"></div>
        <div class="max-w-7xl mx-auto px-6 py-4 relative flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-teal-900 flex items-center justify-center">
                    <i data-lucide="dna" class="text-emerald-500 w-6 h-6"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-teal-900">Agro<span class="text-emerald-600">Tech</span></span>
            </div>
            <div class="hidden md:flex gap-8 items-center text-sm font-medium text-teal-800">
                <a href="#ciencia" class="hover:text-emerald-600 transition-colors">A Ciência</a>
                <a href="#resultados" class="hover:text-emerald-600 transition-colors">Resultados</a>
            </div>
            <button class="bg-teal-900 hover:bg-teal-800 text-white px-6 py-2.5 rounded-full text-sm font-semibold transition-all flex items-center gap-2">
                Falar com Especialista
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </nav>

    <section id="scroll-hero" style="height:400vh;position:relative;background-color:#000;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,58,63,0.9),transparent 60%, rgba(0,0,0,0.3));z-index:1;pointer-events:none;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;">
                <div id="hero-text-container" class="text-center px-6 max-w-5xl mt-24">
                    <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold text-white tracking-tighter leading-[1.1] mb-6">
                        Potencializando Resultados <br class="hidden md:block"/>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200">no Setor Produtivo</span>
                    </h1>
                </div>
            </div>
        </div>
    </section>

    <script>
        function initLucide(){ if(window.lucide){ lucide.createIcons(); }else{ setTimeout(initLucide,200); } }
        initLucide();

        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("hero-canvas");
            const context = canvas.getContext("2d");
            const heroEl = document.getElementById("scroll-hero");
            const titleContainer = document.getElementById("hero-text-container");

            // AJUSTE CRÍTICO: Quantidade e Nomes baseados no seu GitHub
            const frameCount = 78;
            const images = [];
            let loadedImages = 0;

            const progressBar = document.getElementById("progress-bar");
            const loadingText = document.getElementById("loading-text");
            const loader = document.getElementById("loader");

            // Função que gera o nome exato que você subiu
            const getUrl = (index) => {
                const pad = index.toString().padStart(2, '0');
                return `./frame_${pad}_delay-0.041s.webp`;
            };

            function updateLoader() {
                const percentage = Math.floor((loadedImages / frameCount) * 100);
                if (progressBar) progressBar.style.width = `${percentage}%`;
                if (loadingText) loadingText.innerText = `Processando Biotecnologia ${percentage}%...`;

                if (loadedImages === frameCount) {
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => loader.style.visibility = "hidden", 500);
                        document.body.style.overflow = "auto";
                        resizeCanvas();
                    }, 500);
                }
            }

            // Preloading local
            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    images[i] = img;
                    updateLoader();
                    if (i === 0) drawCover(img);
                };
                img.onerror = () => {
                    loadedImages++;
                    console.error("Frame não encontrado:", getUrl(i));
                    updateLoader();
                };
                img.src = getUrl(i);
            }

            function drawCover(img) {
                if (!img || !img.complete) return;
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = img.width / img.height;
                let renderWidth, renderHeight, offsetX = 0, offsetY = 0;

                if (canvasRatio > imgRatio) {
                    renderWidth = canvas.width;
                    renderHeight = img.height * (canvas.width / img.width);
                    offsetY = (canvas.height - renderHeight) / 2;
                } else {
                    renderHeight = canvas.height;
                    renderWidth = img.width * (canvas.height / img.height);
                    offsetX = (canvas.width - renderWidth) / 2;
                }
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(img, offsetX, offsetY, renderWidth, renderHeight);
            }

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                updateScrollState();
            }

            window.addEventListener("resize", resizeCanvas);

            function updateScrollState() {
                const maxScroll = heroEl.offsetHeight - window.innerHeight;
                if (maxScroll <= 0) return;
                const scrollY = window.scrollY;
                const fraction = Math.max(0, Math.min(1, scrollY / maxScroll));
                
                const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * (frameCount - 1)));
                if (images[frameIndex]) {
                    drawCover(images[frameIndex]);
                }

                if (titleContainer) {
                    titleContainer.style.opacity = 1 - (fraction * 4);
                    titleContainer.style.transform = `translateY(${-(fraction * 100)}px)`;
                }
            }

            window.addEventListener("scroll", updateScrollState, { passive: true });
        });
    </script>
</body>
</html>
