<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germano Saúde Animal | Excelência Nutricional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @theme {
            --color-petroleum: #0F3A47;
            --color-emerald: #047857;
            --color-emerald-light: #10B981;
            --color-milky: #F5F7F5;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-milky);
            color: var(--color-petroleum);
            overflow: hidden; 
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased selection:bg-emerald selection:text-white">

    <div id="loader" style="position:fixed;inset:0;background:linear-gradient(135deg,#0F3A47,#047857);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <div class="mb-6 animate-pulse">
            <img src="logo_germano-removebg-preview.png" alt="Germano" class="w-40 h-40 object-contain">
        </div>
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.2);border-radius:99px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:white;width:0%;transition:width 0.2s;"></div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 transition-all duration-300 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-0 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo_germano-removebg-preview.png" alt="Logo" class="w-36 h-36 object-contain scale-160 -translate-x-2 transform-gpu origin-left">
            </div>
            <div class="hidden md:flex gap-10 items-center text-sm font-semibold tracking-wide text-petroleum">
                <a href="#scroll-hero" class="hover:text-emerald transition-colors">Inovação</a>
                <a href="#produtos" class="hover:text-emerald transition-colors">Produtos</a>
                <button class="bg-petroleum text-white px-8 py-3 rounded-full hover:bg-petroleum-dark transition-all cursor-pointer">Falar com Especialista</button>
            </div>
        </div>
    </nav>

    <section id="scroll-hero" style="height:400vh;position:relative;background-color:#000;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0F3A47, transparent 70%);z-index:1;opacity:0.6;"></div>
            
            <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;">
                <div class="text-center px-6 max-w-5xl">
                    
                    <h1 id="text-01" class="text-5xl md:text-7xl font-black text-white tracking-tighter leading-tight mb-6 uppercase drop-shadow-2xl">
                        Soluções ecológicas <br/> <span class="text-emerald-light">para seu rebanho</span>
                    </h1>

                    <p id="text-02" class="text-white/95 text-2xl md:text-4xl font-bold tracking-tight max-w-4xl mx-auto drop-shadow-md opacity-0 translate-y-10">
                        Um único animal afetado pode reduzir drasticamente sua produção.
                    </p>

                </div>
            </div>
        </div>
    </section>

    <section id="produtos" class="py-32 bg-milky relative z-10">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-4xl font-black text-petroleum mb-12">BioTech Germano</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="p-10 rounded-[40px] bg-white/50 backdrop-blur-md border border-white">
                    <h3 class="text-2xl font-bold mb-4">Germano Prime</h3>
                    <p class="text-petroleum/60 text-sm">Alta performance e precisão molecular.</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function initLucide(){ if(window.lucide){ lucide.createIcons(); }else{ setTimeout(initLucide,100); } }
        initLucide();

        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("hero-canvas");
            const context = canvas.getContext("2d");
            const heroEl = document.getElementById("scroll-hero");
            
            const text01 = document.getElementById("text-01");
            const text02 = document.getElementById("text-02");

            const frameCount = 78;
            const images = [];
            let loadedImages = 0;

            const getUrl = (index) => `./frame_${index.toString().padStart(2, '0')}_delay-0.041s.webp`;

            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (images[0]) drawImage(images[0]);
            };

            const drawImage = (img) => {
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = img.width / img.height;
                let drawWidth, drawHeight, x = 0, y = 0;
                if (canvasRatio > imgRatio) {
                    drawWidth = canvas.width;
                    drawHeight = img.height * (canvas.width / img.width);
                    y = (canvas.height - drawHeight) / 2;
                } else {
                    drawHeight = canvas.height;
                    drawWidth = img.width * (canvas.height / img.height);
                    x = (canvas.width - drawWidth) / 2;
                }
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(img, x, y, drawWidth, drawHeight);
            };

            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    images[i] = img;
                    document.getElementById("progress-bar").style.width = `${(loadedImages / frameCount) * 100}%`;
                    if (loadedImages === frameCount) {
                        setTimeout(() => {
                            document.getElementById("loader").style.opacity = "0";
                            setTimeout(() => document.getElementById("loader").style.visibility = "hidden", 500);
                            document.body.style.overflow = "auto";
                            resizeCanvas();
                        }, 400);
                    }
                };
                img.src = getUrl(i);
            }

            window.addEventListener("resize", resizeCanvas);
            
            window.addEventListener("scroll", () => {
                const scrollY = window.scrollY;
                const maxScroll = heroEl.offsetHeight - window.innerHeight;
                const fraction = Math.min(1, scrollY / maxScroll);
                
                // Sequência de frames
                const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));
                if (images[frameIndex]) {
                    requestAnimationFrame(() => drawImage(images[frameIndex]));
                }

                // DINÂMICA DE TEXTOS
                // Texto 01: Fica visível de 0% a 20% do scroll, depois some
                if (fraction < 0.25) {
                    text01.style.opacity = 1 - (fraction * 4);
                    text01.style.transform = `translateY(${-(fraction * 100)}px)`;
                    text01.style.display = "block";
                } else {
                    text01.style.display = "none";
                }

                // Texto 02: Surge entre 35% e 65% do scroll
                if (fraction > 0.35 && fraction < 0.75) {
                    const localFrac = (fraction - 0.35) / 0.15; // Fade in rápido
                    const fadeOutFrac = (fraction - 0.60) / 0.15; // Fade out
                    
                    let opacity = localFrac;
                    if (fraction > 0.60) opacity = 1 - fadeOutFrac;
                    
                    text02.style.opacity = Math.max(0, Math.min(1, opacity));
                    text02.style.transform = `translateY(${20 - (Math.min(1, localFrac) * 20)}px)`;
                    text02.style.display = "block";
                } else {
                    text02.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
