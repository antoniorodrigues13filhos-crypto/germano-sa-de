<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Germano Saúde Animal | Excelência Nutricional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        @theme {
            --color-petroleum: #0F3A47;
            --color-petroleum-dark: #0A2730;
            --color-petroleum-light: #1A5465;
            --color-emerald: #047857;
            --color-emerald-dark: #065F46;
            --color-emerald-light: #10B981;
            --color-milky: #F5F7F5;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-milky);
            color: var(--color-petroleum);
            overflow: hidden; 
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased selection:bg-emerald selection:text-white">

    <div id="loader" style="position:fixed;inset:0;background:linear-gradient(135deg,#0F3A47,#047857);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.5s ease-out,visibility 0.5s;">
        <div class="mb-6 animate-pulse">
            <img src="logo_germano-removebg-preview.png" alt="Germano Saúde Animal" class="w-32 h-32 object-contain">
        </div>
        <div style="width:16rem;height:2px;background:rgba(255,255,255,0.2);border-radius:99px;overflow:hidden;">
            <div id="progress-bar" style="height:100%;background:white;width:0%;transition:width 0.2s;"></div>
        </div>
        <p id="loading-text" class="text-white/60 mt-4 text-xs font-medium tracking-[0.2em] uppercase">Iniciando Tecnologia Germano</p>
    </div>

    <nav class="fixed top-0 w-full z-50 transition-all duration-300 glass-nav">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo_germano-removebg-preview.png" alt="Logo Germano" class="w-16 h-16 object-contain">
            </div>
            
            <div class="hidden md:flex gap-10 items-center text-sm font-semibold tracking-wide text-petroleum">
                <a href="#scroll-hero" class="hover:text-emerald transition-colors">Inovação</a>
                <a href="#produtos" class="hover:text-emerald transition-colors">Produtos</a>
                <button class="bg-petroleum text-white px-8 py-3 rounded-full hover:bg-petroleum-dark transition-all shadow-lg shadow-petroleum/10">
                    Especialista
                </button>
            </div>
        </div>
    </nav>

    <section id="scroll-hero" style="height:400vh;position:relative;background-color:#000;">
        <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0F3A47, transparent 70%);z-index:1;opacity:0.6;"></div>
            
            <div id="hero-text-container" style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:none;">
                <div class="text-center px-6 max-w-5xl mt-20">
                    <h1 class="text-6xl md:text-8xl font-black text-white tracking-tighter leading-[0.9] mb-6">
                        PRECISÃO <br/> <span class="text-emerald-light">MOLECULAR</span>
                    </h1>
                    <p class="text-white/70 text-lg md:text-xl font-medium tracking-wide max-w-2xl mx-auto">
                        Nutrição avançada de Anápolis-GO para o mundo.
                    </p>
                </div>
            </div>
        </div>
    </section>

    <section id="produtos" class="py-32 bg-milky relative z-10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl md:text-6xl font-black text-petroleum mb-16 tracking-tight">Catálogo de Alta Performance</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                <div class="glass-card p-10 rounded-[40px] hover:translate-y-[-10px] transition-transform">
                    <div class="w-12 h-12 bg-emerald/10 rounded-2xl flex items-center justify-center mb-6 text-emerald">
                        <i data-lucide="microscope"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-4">Germano Prime</h3>
                    <p class="text-petroleum/60 text-sm leading-relaxed mb-8">Otimização máxima para bovinos de corte com minerais quelatados.</p>
                    <div class="h-[1px] bg-petroleum/10 w-full"></div>
                </div>
                </div>
        </div>
    </section>

    <script>
        // Init Lucide Icons
        function initLucide(){ if(window.lucide){ lucide.createIcons(); }else{ setTimeout(initLucide,100); } }
        initLucide();

        // Canvas / Video Scrubbing Logic
        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("hero-canvas");
            const context = canvas.getContext("2d");
            const frameCount = 78;
            const images = [];
            let loadedImages = 0;

            const progressBar = document.getElementById("progress-bar");
            const loader = document.getElementById("loader");

            const getUrl = (index) => {
                const pad = index.toString().padStart(2, '0');
                return `./frame_${pad}_delay-0.041s.webp`;
            };

            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (images[0]) drawImage(images[0]);
            };

            const drawImage = (img) => {
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = img.width / img.height;
                let drawWidth, drawHeight, x = 0, y = 0;

                if (canvasRatio > imgRatio) {
                    drawWidth = canvas.width;
                    drawHeight = img.height * (canvas.width / img.width);
                    y = (canvas.height - drawHeight) / 2;
                } else {
                    drawHeight = canvas.height;
                    drawWidth = img.width * (canvas.height / img.height);
                    x = (canvas.width - drawWidth) / 2;
                }
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.drawImage(img, x, y, drawWidth, drawHeight);
            };

            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    images[i] = img;
                    if (progressBar) progressBar.style.width = `${(loadedImages / frameCount) * 100}%`;
                    if (loadedImages === frameCount) {
                        setTimeout(() => {
                            loader.style.opacity = "0";
                            setTimeout(() => loader.style.visibility = "hidden", 500);
                            document.body.style.overflow = "auto";
                            resizeCanvas();
                        }, 400);
                    }
                };
                img.src = getUrl(i);
            }

            window.addEventListener("resize", resizeCanvas);
            window.addEventListener("scroll", () => {
                const scrollY = window.scrollY;
                const maxScroll = document.getElementById("scroll-hero").offsetHeight - window.innerHeight;
                const fraction = Math.min(1, scrollY / maxScroll);
                const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));
                
                if (images[frameIndex]) {
                    requestAnimationFrame(() => drawImage(images[frameIndex]));
                }

                const title = document.getElementById("hero-text-container");
                title.style.opacity = 1 - (fraction * 3);
                title.style.transform = `translateY(${-fraction * 50}px)`;
            });
        });
    </script>
</body>
</html>
